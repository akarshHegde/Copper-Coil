<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Copper Coil</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app">
      <section class="panel">
        <div class="panel__header">
          <div>
            <p class="eyebrow">Classic Arcade</p>
            <h1>Copper Coil</h1>
          </div>
          <div class="scoreboard">
            <span>Score</span>
            <strong id="score">0</strong>
          </div>
        </div>

        <div class="status-row">
          <p id="status">Use arrow keys or WASD to start playing.</p>
          <div class="actions">
            <button id="pause-button" type="button">Pause</button>
            <button id="restart-button" type="button">Restart</button>
          </div>
        </div>

        <div
          id="board"
          class="board"
          role="grid"
          aria-label="Snake game board"
        ></div>

        <div class="controls" aria-label="On-screen controls">
          <button class="control control--up" data-direction="up" type="button">Up</button>
          <div class="controls__middle">
            <button class="control" data-direction="left" type="button">Left</button>
            <button class="control" data-direction="down" type="button">Down</button>
            <button class="control" data-direction="right" type="button">Right</button>
          </div>
        </div>
      </section>
    </main>

    <script type="module" src="./src/main.js"></script>
  </body>
</html>
